{% block extra_js %}
<script>
var HEROES = {};
var ITEMS  = {};
var currentAccountId = '';

function delay(ms){ return new Promise(function(r){setTimeout(r,ms);}); }

fetch('/api/me').then(function(r){return r.json();}).catch(function(){return{logged_in:false};})
.then(async function(user){
  if(!user.logged_in){window.location.href='/';return;}
  document.getElementById('p-avatar').src=user.avatar;
  document.getElementById('p-nickname').textContent=user.nickname;
  document.getElementById('p-steam-link').href='https://steamcommunity.com/profiles/'+user.steam_id;
  currentAccountId=(BigInt(user.steam_id)-BigInt('76561197960265728')).toString();

  var heroes=await fetch('https://api.opendota.com/api/heroes').then(function(r){return r.json();}).catch(function(){return[];});
  await delay(600);
  var items=await fetch('https://api.opendota.com/api/constants/items').then(function(r){return r.json();}).catch(function(){return{};});

  if(!Array.isArray(heroes))heroes=[];
  heroes.forEach(function(h){
    var short=h.name.replace('npc_dota_hero_','');
    HEROES[h.id]={
      name:h.localized_name,
      img:'https://cdn.akamai.steamstatic.com/apps/dota2/images/dota_react/heroes/icons/'+short+'.png',
      img_wide:'https://cdn.akamai.steamstatic.com/apps/dota2/images/dota_react/heroes/'+short+'.png'
    };
  });
  Object.keys(items).forEach(function(key){
    var item=items[key];if(!item)return;
    var entry={name:item.dname||key,img:item.img?'https://cdn.cloudflare.steamstatic.com'+item.img:null};
    if(item.id!==undefined)ITEMS[item.id]=entry;
    ITEMS[key]=entry;
  });

  await delay(600);
  loadDotaStats(currentAccountId);
  await delay(1000);
  loadTopHeroes(currentAccountId);
  await delay(1000);
  loadRecentMatches(currentAccountId);
});

function loadDotaStats(accountId){
  fetch('https://api.opendota.com/api/players/'+accountId+'/wl')
    .then(function(r){return r.json();})
    .then(async function(wl){
      await delay(600);
      return fetch('https://api.opendota.com/api/players/'+accountId+'/totals')
        .then(function(r){return r.json();})
        .then(function(totals){
          document.getElementById('loading-stats').style.display='none';
          var wins=wl.win||0,losses=wl.lose||0,total=wins+losses,wr=total>0?Math.round(wins/total*100):0;
          document.getElementById('s-matches').textContent=total;
          document.getElementById('s-wins').textContent=wins;
          document.getElementById('s-losses').textContent=losses;
          document.getElementById('s-winrate').textContent=wr+'%';
          document.getElementById('dota-stats').style.display='grid';
          var kills=0,deaths=0,assists=0,gpmSum=0,gpmN=1;
          if(Array.isArray(totals))totals.forEach(function(t){
            if(t.field==='kills')kills=t.sum;
            if(t.field==='deaths')deaths=t.sum;
            if(t.field==='assists')assists=t.sum;
            if(t.field==='gold_per_min'){gpmSum=t.sum;gpmN=t.n>0?t.n:1;}
          });
          document.getElementById('s-kda').textContent=deaths>0?((kills+assists)/deaths).toFixed(2):(kills+assists).toFixed(2);
          document.getElementById('s-gpm').textContent=gpmSum>0?Math.round(gpmSum/gpmN):'—';
        });
    }).catch(function(){
      document.getElementById('loading-stats').style.display='none';
      document.getElementById('private-profile').style.display='block';
    });
}

function loadTopHeroes(accountId){
  fetch('https://api.opendota.com/api/players/'+accountId+'/heroes')
    .then(function(r){return r.json();})
    .then(function(heroes){
      var filtered=heroes.filter(function(h){return h.games>=50;}).sort(function(a,b){return b.games-a.games;});
      document.getElementById('heroes-section').style.display='block';
      if(filtered.length===0){document.getElementById('heroes-empty').style.display='block';return;}
      var grid=document.getElementById('heroes-grid');grid.innerHTML='';
      filtered.forEach(function(h){
        var hero=HEROES[h.hero_id]||{name:'Герой #'+h.hero_id,img:'',img_wide:''};
        var wr=h.games>0?Math.round(h.win/h.games*100):0;
        var wrColor=wr>=55?'#10b981':wr>=45?'#f59e0b':'#ef4444';
        var card=document.createElement('div');card.className='hero-card';
        card.innerHTML=
          '<img class="hero-card-img" src="'+hero.img_wide+'" onerror="this.src=\''+hero.img+'\'" />'+
          '<div class="hero-card-body">'+
            '<div class="hero-card-name">'+hero.name+'</div>'+
            '<div class="hero-card-games">'+h.games+' игр · <span style="color:'+wrColor+'">'+wr+'% побед</span></div>'+
            '<div class="hero-wr-bar"><div class="hero-wr-fill" style="width:'+wr+'%;background:'+wrColor+'"></div></div>'+
          '</div>';
        (function(hid,hdata,gdata){
          card.onclick=function(){openHeroModal(hid,hdata,gdata,accountId);};
        })(h.hero_id,hero,h);
        grid.appendChild(card);
      });
    }).catch(function(){});
}

function openHeroModal(heroId,hero,gamesData,accountId){
  var modal=document.getElementById('hero-modal');
  modal.style.display='block';
  document.body.style.overflow='hidden';
  document.getElementById('modal-hero-img').src=hero.img_wide||hero.img;
  document.getElementById('modal-hero-name').textContent=hero.name;
  var wr=gamesData.games>0?Math.round(gamesData.win/gamesData.games*100):0;
  document.getElementById('modal-hero-sub').textContent=gamesData.games+' игр · '+wr+'% побед';
  document.getElementById('modal-matches').innerHTML='<div style="text-align:center;padding:2rem;color:var(--text-muted)">⏳ Загружаем матчи...</div>';
  document.getElementById('modal-stats').innerHTML='';
  fetch('https://api.opendota.com/api/players/'+accountId+'/matches?hero_id='+heroId+'&limit=50')
    .then(function(r){return r.json();})
    .then(function(matches){
      if(!matches||matches.length===0){
        document.getElementById('modal-matches').innerHTML='<div style="text-align:center;padding:2rem;color:var(--text-muted)">Матчей не найдено</div>';
        return;
      }
      var tk=0,td=0,ta=0,wins=0;
      matches.forEach(function(m){
        tk+=m.kills;td+=m.deaths;ta+=m.assists;
        var won=(m.player_slot<128&&m.radiant_win)||(m.player_slot>=128&&!m.radiant_win);
        if(won)wins++;
      });
      var n=matches.length,mwr=Math.round(wins/n*100);
      var mkda=td>0?((tk+ta)/td).toFixed(2):(tk+ta).toFixed(2);
      var statsEl=document.getElementById('modal-stats');
      [['Матчей',n],['Винрейт',mwr+'%'],['К/Д/А',mkda]].forEach(function(s){
        var b=document.createElement('div');b.className='stat-card';b.style.padding='0.75rem';
        b.innerHTML='<div class="stat-value" style="font-size:1.3rem">'+s[1]+'</div><div class="stat-label">'+s[0]+'</div>';
        statsEl.appendChild(b);
      });
      var list=document.getElementById('modal-matches');list.innerHTML='';
      matches.forEach(function(m){
        var won=(m.player_slot<128&&m.radiant_win)||(m.player_slot>=128&&!m.radiant_win);
        var mins=Math.floor(m.duration/60),secs=m.duration%60;
        var row=document.createElement('div');row.className='match-row';
        row.onclick=function(){window.open('https://www.opendota.com/matches/'+m.match_id,'_blank');};
        var heroImg2=hero.img?'<img style="width:40px;height:40px;border-radius:4px;object-fit:cover;object-position:center top;flex-shrink:0" src="'+hero.img+'" onerror="this.style.display=\'none\'" />':'';
        row.innerHTML=
          '<span class="match-result '+(won?'win':'loss')+'">'+(won?'Победа':'Поражение')+'</span>'+
          heroImg2+
          '<span class="match-kda"><span>'+m.kills+'</span>/<span style="color:var(--danger)">'+m.deaths+'</span>/<span>'+m.assists+'</span></span>'+
          '<span class="match-duration">⏱ '+mins+':'+(secs<10?'0':'')+secs+'</span>'+
          '<div class="match-items" id="mitems-'+m.match_id+'"><span style="font-size:0.7rem;color:var(--text-muted)">⏳</span></div>';
        list.appendChild(row);
      });
      function loadItemsBatch(arr,index){
        if(index>=arr.length)return;
        arr.slice(index,index+3).forEach(function(m){
          (function(matchId){
            fetch('https://api.opendota.com/api/matches/'+matchId)
              .then(function(r){return r.json();})
              .then(function(detail){
                var player=(detail.players||[]).find(function(p){return p.account_id===parseInt(accountId);});
                var itemsEl=document.getElementById('mitems-'+matchId);
                if(!itemsEl)return;
                if(!player){itemsEl.innerHTML='';return;}
                var ih='';
                [player.item_0,player.item_1,player.item_2,player.item_3,player.item_4,player.item_5].forEach(function(id){
                  if(id&&id>0&&ITEMS[id]&&ITEMS[id].img){
                    ih+='<img class="item-icon" src="'+ITEMS[id].img+'" title="'+(ITEMS[id].name||'')+'" onerror="this.className=\'item-icon-empty\';this.removeAttribute(\'src\')" />';
                  } else {ih+='<div class="item-icon-empty"></div>';}
                });
                itemsEl.innerHTML=ih;
              }).catch(function(){
                var el=document.getElementById('mitems-'+matchId);
                if(el)el.innerHTML='';
              });
          })(m.match_id);
        });
        setTimeout(function(){loadItemsBatch(arr,index+3);},1500);
      }
      loadItemsBatch(matches,0);
    }).catch(function(){
      document.getElementById('modal-matches').innerHTML='<div style="text-align:center;padding:2rem;color:var(--danger)">Ошибка загрузки</div>';
    });
}

function closeModal(){
  document.getElementById('hero-modal').style.display='none';
  document.body.style.overflow='';
}

function loadRecentMatches(accountId){
  fetch('https://api.opendota.com/api/players/'+accountId+'/matches?limit=10&significant=0')
    .then(function(r){return r.json();})
    .then(function(matches){
      if(!matches||matches.length===0)return;
      var list=document.getElementById('matches-list');
      function loadMatchDetail(index){
        if(index>=matches.length)return;
        var m=matches[index];
        fetch('https://api.opendota.com/api/matches/'+m.match_id)
          .then(function(r){return r.json();})
          .then(function(detail){
            var player=(detail.players||[]).find(function(p){return p.account_id===parseInt(accountId);});
            if(player){m.item_0=player.item_0;m.item_1=player.item_1;m.item_2=player.item_2;m.item_3=player.item_3;m.item_4=player.item_4;m.item_5=player.item_5;m.gold_per_min=player.gold_per_min;}
            renderMatch(m,list);
            if(index===0){document.getElementById('matches-section').style.display='block';document.getElementById('matches-divider').style.display='block';}
          }).catch(function(){
            renderMatch(m,list);
            if(index===0){document.getElementById('matches-section').style.display='block';document.getElementById('matches-divider').style.display='block';}
          }).finally(function(){
            setTimeout(function(){loadMatchDetail(index+1);},800);
          });
      }
      loadMatchDetail(0);
    }).catch(function(){});
}

function renderMatch(m,list){
  var won=(m.player_slot<128&&m.radiant_win)||(m.player_slot>=128&&!m.radiant_win);
  var hero=HEROES[m.hero_id]||{name:'Герой #'+m.hero_id,img:'',img_wide:''};
  var mins=Math.floor(m.duration/60),secs=m.duration%60;
  var itemsHtml='';
  [m.item_0,m.item_1,m.item_2,m.item_3,m.item_4,m.item_5].forEach(function(id){
    if(id&&id>0&&ITEMS[id]&&ITEMS[id].img){
      itemsHtml+='<img class="item-icon" src="'+ITEMS[id].img+'" title="'+(ITEMS[id].name||'')+'" onerror="this.className=\'item-icon-empty\';this.removeAttribute(\'src\')" />';
    } else {itemsHtml+='<div class="item-icon-empty"></div>';}
  });
  var heroImg=hero.img?'<img class="match-hero-img" src="'+hero.img+'" onerror="this.style.display=\'none\'" />':'';
  var row=document.createElement('div');row.className='match-row';
  row.onclick=function(){window.open('https://www.opendota.com/matches/'+m.match_id,'_blank');};
  row.innerHTML=
    '<span class="match-result '+(won?'win':'loss')+'">'+(won?'Победа':'Поражение')+'</span>'+
    '<div class="match-hero-wrap">'+heroImg+'<span class="match-hero">'+hero.name+'</span></div>'+
    '<span class="match-kda"><span>'+m.kills+'</span>/<span style="color:var(--danger)">'+m.deaths+'</span>/<span>'+m.assists+'</span></span>'+
    '<span class="match-gpm">💰 '+(m.gold_per_min||'—')+' GPM</span>'+
    '<span class="match-duration">⏱ '+mins+':'+(secs<10?'0':'')+secs+'</span>'+
    '<div class="match-items">'+itemsHtml+'</div>';
  list.appendChild(row);
}
</script>
{% endblock %}
