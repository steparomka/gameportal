{% extends "base.html" %}
{% block title %}Мета героев — DotaClutch{% endblock %}

{% block content %}
<div class="container">
  <div class="page-header">
    <h1>⚡ <span class="accent">Мета героев</span></h1>
    <p>Патч 7.41c · Winrate и пики по всем рангам</p>
  </div>

  <!-- ФИЛЬТРЫ -->
  <div class="meta-filters">
    <!-- Роль -->
    <div class="meta-filter-row">
      <span class="meta-filter-label">Роль</span>
      <div class="role-tabs">
        <button class="role-btn active" data-role="carry">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Carry
        </button>
        <button class="role-btn" data-role="mid">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8" stroke="var(--bg-dark)" stroke-width="2"/></svg>
          Mid
        </button>
        <button class="role-btn" data-role="offlane">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
          Offlane
        </button>
        <button class="role-btn" data-role="support">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>
          Support
        </button>
      </div>
    </div>

    <!-- Ранги -->
    <div class="meta-filter-row">
      <span class="meta-filter-label">Ранг</span>
      <div class="rank-tabs">
        <button class="rank-btn active" data-rank="all">
          <span class="rank-medal all-medal">★</span>
          <span class="rank-label">Все</span>
        </button>
        <button class="rank-btn" data-rank="herald">
          <img class="rank-img" src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/rank_icons/rank_icon_1.png" alt="Herald"/>
          <span class="rank-label">Herald</span>
        </button>
        <button class="rank-btn" data-rank="guardian">
          <img class="rank-img" src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/rank_icons/rank_icon_2.png" alt="Guardian"/>
          <span class="rank-label">Guardian</span>
        </button>
        <button class="rank-btn" data-rank="crusader">
          <img class="rank-img" src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/rank_icons/rank_icon_3.png" alt="Crusader"/>
          <span class="rank-label">Crusader</span>
        </button>
        <button class="rank-btn" data-rank="archon">
          <img class="rank-img" src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/rank_icons/rank_icon_4.png" alt="Archon"/>
          <span class="rank-label">Archon</span>
        </button>
        <button class="rank-btn" data-rank="legend">
          <img class="rank-img" src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/rank_icons/rank_icon_5.png" alt="Legend"/>
          <span class="rank-label">Legend</span>
        </button>
        <button class="rank-btn" data-rank="ancient">
          <img class="rank-img" src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/rank_icons/rank_icon_6.png" alt="Ancient"/>
          <span class="rank-label">Ancient</span>
        </button>
        <button class="rank-btn" data-rank="divine">
          <img class="rank-img" src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/rank_icons/rank_icon_7.png" alt="Divine"/>
          <span class="rank-label">Divine</span>
        </button>
        <button class="rank-btn" data-rank="immortal">
          <img class="rank-img" src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/rank_icons/rank_icon_8.png" alt="Immortal"/>
          <span class="rank-label">Immortal</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Бейдж -->
  <div class="meta-badge-row">
    <span id="meta-badge"></span>
    <span class="meta-source">Dotabuff · Патч 7.41c</span>
  </div>

  <!-- Список -->
  <div id="meta-list"></div>
</div>
{% endblock %}

{% block extra_css %}
<style>
/* ── Фильтры ── */
.meta-filters{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;margin-bottom:1.25rem;display:flex;flex-direction:column;gap:0.85rem}
.meta-filter-row{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap}
.meta-filter-label{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;flex-shrink:0;min-width:32px}

/* Роли */
.role-tabs{display:flex;gap:0.35rem;flex-wrap:wrap}
.role-btn{display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.9rem;border-radius:99px;font-family:var(--font-head);font-size:0.78rem;font-weight:700;letter-spacing:0.5px;background:transparent;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all 0.2s}
.role-btn:hover{border-color:var(--accent);color:var(--accent)}
.role-btn.active{background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(168,85,247,0.1));border-color:var(--accent);color:var(--accent)}

/* Ранги */
.rank-tabs{display:flex;gap:0.3rem;flex-wrap:wrap}
.rank-btn{display:flex;align-items:center;gap:0.35rem;padding:0.3rem 0.65rem;border-radius:99px;font-family:var(--font-mono);font-size:0.68rem;background:transparent;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.rank-btn:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.2)}
.rank-btn.active{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.3);color:var(--text-bright)}
.rank-img{width:22px;height:22px;object-fit:contain;flex-shrink:0}
.rank-medal{font-size:1rem;flex-shrink:0}
.all-medal{color:var(--accent)}
.rank-label{font-size:0.68rem}
@media(max-width:600px){.rank-label{display:none}.rank-img{width:20px;height:20px}}

/* Бейдж */
.meta-badge-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;flex-wrap:wrap;gap:0.5rem}
#meta-badge{font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted)}
.meta-source{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);opacity:0.6}

/* ══ СТРОКА ГЕРОЯ ══ */
.hero-row{display:flex;align-items:center;gap:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:0.5rem;overflow:hidden;transition:all 0.25s;cursor:default;animation:card-in 0.35s ease both}
@keyframes card-in{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.hero-row:hover{border-color:rgba(0,212,255,0.35);box-shadow:0 4px 20px rgba(0,0,0,0.25);transform:translateX(3px)}

/* Номер */
.hr-num{font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);width:36px;text-align:center;flex-shrink:0;padding:0 0.5rem}
.hr-num.top3{color:var(--warning);font-weight:700}

/* Иконка героя */
.hr-icon-wrap{width:64px;height:36px;flex-shrink:0;overflow:hidden;position:relative}
.hr-icon{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform 0.3s}
.hero-row:hover .hr-icon{transform:scale(1.08)}
.hr-icon-ph{width:64px;height:36px;background:linear-gradient(135deg,var(--bg-surface),var(--bg-card));display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}

/* Имя */
.hr-name{font-family:var(--font-head);font-size:0.9rem;font-weight:700;color:var(--text-bright);flex:1;padding:0 0.75rem;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.2s}
.hero-row:hover .hr-name{color:var(--accent)}

/* Винрейт */
.hr-wr{font-family:var(--font-mono);font-size:0.78rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:6px;flex-shrink:0;min-width:62px;text-align:center}
.hr-wr.wr-s{background:rgba(255,107,53,0.15);color:#ff6b35;border:1px solid rgba(255,107,53,0.25)}
.hr-wr.wr-a{background:rgba(16,185,129,0.12);color:var(--success);border:1px solid rgba(16,185,129,0.2)}
.hr-wr.wr-b{background:rgba(245,158,11,0.1);color:var(--warning);border:1px solid rgba(245,158,11,0.2)}
.hr-wr.wr-c{background:rgba(100,116,139,0.1);color:var(--text-muted);border:1px solid rgba(100,116,139,0.15)}

/* Пики */
.hr-picks{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);padding:0 0.75rem;flex-shrink:0;min-width:55px;text-align:right}

/* Тир */
.hr-tier{width:36px;text-align:center;flex-shrink:0}
.tier-badge{display:inline-block;font-family:var(--font-mono);font-size:0.65rem;font-weight:800;padding:0.18rem 0.45rem;border-radius:5px;letter-spacing:0.5px}
.tier-badge.s{background:linear-gradient(135deg,#ff6b35,#ff4500);color:#fff;box-shadow:0 2px 8px rgba(255,107,53,0.4)}
.tier-badge.a{background:linear-gradient(135deg,var(--success),#059669);color:#fff;box-shadow:0 2px 6px rgba(16,185,129,0.35)}
.tier-badge.b{background:linear-gradient(135deg,var(--warning),#d97706);color:#fff}
.tier-badge.c{background:rgba(100,116,139,0.2);color:var(--text-muted);border:1px solid rgba(100,116,139,0.3)}

/* Полоска WR */
.hr-bar-wrap{width:80px;padding:0 0.5rem;flex-shrink:0}
.hr-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden}
.hr-bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease}
.hr-bar-fill.s{background:linear-gradient(90deg,#ff6b35,#ff4500)}
.hr-bar-fill.a{background:linear-gradient(90deg,var(--success),#059669)}
.hr-bar-fill.b{background:linear-gradient(90deg,var(--warning),#d97706)}
.hr-bar-fill.c{background:var(--text-muted)}

@media(max-width:600px){
  .hr-bar-wrap{display:none}
  .hr-picks{display:none}
  .hr-icon-wrap{width:48px;height:28px}
  .hr-num{width:28px}
}
</style>
{% endblock %}

const RANK_NAMES={all:'Все ранги',herald:'Herald',guardian:'Guardian',crusader:'Crusader',archon:'Archon',legend:'Legend',ancient:'Ancient',divine:'Divine',immortal:'Immortal'};
const ROLE_NAMES={carry:'Carry',mid:'Mid',support:'Support',offlane:'Offlane'};

function renderMeta(role, rank){
  rank = rank||'all';
  const heroes = (META[role]||META.carry)[rank]||(META[role]||META.carry)['all'];
  document.getElementById('meta-badge').textContent = `📊 ${ROLE_NAMES[role]||'Carry'} · ${RANK_NAMES[rank]} · ${heroes.length} героев`;

  document.getElementById('meta-list').innerHTML = heroes.map((h,i)=>{
    const img = heroImg(h.name);
    const wrVal = parseFloat(h.wr);
    // Полоска: от 49% до 58% → 0-100%
    const barPct = Math.min(100, Math.max(0, (wrVal - 49) / 9 * 100));
    const isTop3 = i < 3;
    return `<div class="hero-row" style="animation-delay:${i*0.04}s">
      <span class="hr-num${isTop3?' top3':''}">${i+1}</span>
      <div class="hr-icon-wrap">
        <img class="hr-icon" src="${img}" alt="${esc(h.name)}"
             onerror="this.parentElement.innerHTML='<div class=hr-icon-ph>🎮</div>'"/>
      </div>
      <span class="hr-name">${esc(h.name)}</span>
      <div class="hr-bar-wrap">
        <div class="hr-bar"><div class="hr-bar-fill ${h.tier}" style="width:${barPct}%"></div></div>
      </div>
      <span class="hr-wr wr-${h.tier}">${h.wr}%</span>
      <span class="hr-picks">${h.picks}</span>
      <div class="hr-tier"><span class="tier-badge ${h.tier}">${h.tier.toUpperCase()}</span></div>
    </div>`;
  }).join('');
}

renderMeta('carry','all');
window._currentRank='all';
</script>
