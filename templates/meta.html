{% extends "base.html" %}
{% block title %}Мета героев — DotaClutch{% endblock %}

{% block content %}
<div class="container">
  <div class="page-header">
    <h1>⚡ <span class="accent">Мета героев</span></h1>
    <p>Актуальный патч · Winrate и пики по всем рангам</p>
  </div>

  <div class="meta-filters">
    <div class="meta-filter-row">
      <span class="meta-filter-label">Роль:</span>
      <div class="meta-tabs">
        <button class="meta-tab-btn active" data-role="carry">Carry</button>
        <button class="meta-tab-btn" data-role="mid">Mid</button>
        <button class="meta-tab-btn" data-role="support">Support</button>
        <button class="meta-tab-btn" data-role="offlane">Offlane</button>
      </div>
    </div>
    <div class="meta-filter-row">
      <span class="meta-filter-label">Ранг:</span>
      <div class="rank-tabs">
        <button class="rank-btn active" data-rank="all">Все</button>
        <button class="rank-btn" data-rank="herald" style="color:#8B6914"><span class="rank-icon">🪙</span><span class="rank-label"> Herald</span></button>
        <button class="rank-btn" data-rank="guardian" style="color:#6B8E23"><span class="rank-icon">🛡️</span><span class="rank-label"> Guard</span></button>
        <button class="rank-btn" data-rank="crusader" style="color:#4169E1"><span class="rank-icon">⚔️</span><span class="rank-label"> Crus</span></button>
        <button class="rank-btn" data-rank="archon" style="color:#00CED1"><span class="rank-icon">🌀</span><span class="rank-label"> Archon</span></button>
        <button class="rank-btn" data-rank="legend" style="color:#9370DB"><span class="rank-icon">⭐</span><span class="rank-label"> Legend</span></button>
        <button class="rank-btn" data-rank="ancient" style="color:#FF8C00"><span class="rank-icon">🔥</span><span class="rank-label"> Ancient</span></button>
        <button class="rank-btn" data-rank="divine" style="color:#FFD700"><span class="rank-icon">✨</span><span class="rank-label"> Divine</span></button>
        <button class="rank-btn" data-rank="immortal" style="color:#FF4500"><span class="rank-icon">👑</span><span class="rank-label"> Imm</span></button>
      </div>
    </div>
  </div>

  <div id="meta-badge" style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);margin-bottom:1rem"></div>

  <div id="meta-list" class="meta-grid"></div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.meta-filters{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1rem;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.meta-filter-row{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}
.meta-filter-label{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;flex-shrink:0;width:36px}
.meta-tabs{display:flex;gap:0.35rem;flex-wrap:wrap}
.meta-tab-btn{padding:0.3rem 0.8rem;border-radius:99px;font-family:var(--font-mono);font-size:0.72rem;background:transparent;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all 0.2s}
.meta-tab-btn.active,.meta-tab-btn:hover{background:rgba(0,212,255,0.1);border-color:var(--accent);color:var(--accent)}
.rank-tabs{display:flex;gap:0.3rem;flex-wrap:wrap}
.rank-btn{display:flex;align-items:center;padding:0.25rem 0.6rem;border-radius:99px;font-family:var(--font-mono);font-size:0.68rem;background:transparent;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.rank-btn:hover{border-color:currentColor;background:rgba(255,255,255,0.04)}
.rank-btn.active{background:rgba(255,255,255,0.07);border-color:currentColor;font-weight:700}
.rank-btn.active[data-rank="all"]{color:var(--accent);border-color:var(--accent);background:rgba(0,212,255,0.1)}
.rank-icon{font-size:0.8rem}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0.6rem}
.hero-meta-row{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 0.9rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);transition:all 0.2s}
.hero-meta-row:hover{border-color:rgba(0,212,255,0.3);transform:translateX(2px)}
.hero-meta-num{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);width:20px;text-align:center;flex-shrink:0}
.hero-meta-name{font-family:var(--font-head);font-size:0.9rem;font-weight:600;color:var(--text-bright);flex:1}
.meta-stat{font-family:var(--font-mono);font-size:0.72rem;padding:0.12rem 0.45rem;border-radius:4px}
.meta-stat.wr{background:rgba(16,185,129,0.12);color:var(--success);border:1px solid rgba(16,185,129,0.2)}
.meta-stat.pick{background:rgba(245,158,11,0.1);color:var(--warning);border:1px solid rgba(245,158,11,0.2)}
.meta-tier{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tier-s{background:#ff6b35;box-shadow:0 0 6px #ff6b35}
.tier-a{background:var(--success);box-shadow:0 0 5px var(--success)}
.tier-b{background:var(--warning)}
.tier-c{background:var(--text-muted)}
.tier-label{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);width:12px;text-align:center}
@media(max-width:480px){.rank-label{display:none}.meta-grid{grid-template-columns:1fr}}
</style>
{% endblock %}

{% block extra_js %}
<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

document.querySelectorAll('.meta-tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.meta-tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderMeta(btn.dataset.role, window._currentRank||'all');
  });
});
document.querySelectorAll('.rank-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.rank-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    window._currentRank=btn.dataset.rank;
    renderMeta(document.querySelector('.meta-tab-btn.active')?.dataset.role||'carry', btn.dataset.rank);
  });
});

const ROLE_NAMES={carry:'Carry',mid:'Mid',support:'Support',offlane:'Offlane'};

function renderMeta(role, rank){
  rank=rank||'all';
  const heroes=(META[role]||META.carry)[rank]||(META[role]||META.carry)['all'];
  const rankName=RANK_NAMES[rank]||'Все';
  const roleName=ROLE_NAMES[role]||'Carry';
  document.getElementById('meta-badge').textContent=
    '📊 '+roleName+' · '+rankName+' · '+heroes.length+' героев';
  document.getElementById('meta-list').innerHTML=heroes.map((h,i)=>
    '<div class="hero-meta-row">'+
      '<span class="hero-meta-num">'+(i+1)+'</span>'+
      '<span class="hero-meta-name">'+esc(h.name)+'</span>'+
      '<span class="meta-stat wr">'+h.wr+'%</span>'+
      '<span class="meta-stat pick">'+h.picks+'</span>'+
      '<span class="tier-label">'+h.tier.toUpperCase()+'</span>'+
      '<span class="meta-tier tier-'+h.tier+'"></span>'+
    '</div>'
  ).join('');
}

renderMeta('carry','all');
